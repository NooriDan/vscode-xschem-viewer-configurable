name: Render smoke

# Drives the real WASM viewer in headless Chromium and asserts a schematic actually renders —
# the gap the dependency-free `npm test` suite cannot cover.
#
# Verified locally: 8/8 symbols resolved (IHP nmos+pmos, SKY130 nfet, stock devices, code_shown),
# 110 SVG shapes, 0 page errors, and mutation-tested (hiding a bundled symbol makes it exit 1).
#
# Note this check does NOT guard property tokenization: its assertions are value-blind, so a grammar
# regression that truncates a value still renders and passes here. test/parser.test.cjs covers that,
# and it runs in the required `npm test` matrix.
#
# Kept in its own workflow (not a job in ci.yml) because it needs a ~115 MB browser download, so an
# infrastructure flake here must not block the resolver test matrix. Promote it to a required check
# once it has a track record on GitHub-hosted runners.
#
# The harness needs `openssl` (present on ubuntu-latest) to mint a self-signed cert: it must serve
# over HTTPS, since the resolver loads the top-level schematic via its `https://` branch.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  smoke:
    name: Headless render
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # --no-save: playwright stays out of package.json so `npm test` remains dependency-free.
      - name: Install Playwright + Chromium
        run: |
          npm i --no-save playwright
          npx playwright install --with-deps chromium

      - name: Render smoke test
        run: npm run test:smoke

      - name: Upload render screenshot
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: render-smoke-screenshot
          path: test/smoke/render-smoke.png
          if-no-files-found: warn
