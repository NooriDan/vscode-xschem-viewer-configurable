name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run test suite
        run: npm test

  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip rsync
      - name: Build VSIX
        run: ./build-vsix.sh
      # Resolve the name from package.json rather than globbing. The repo tracks a built .vsix, so a
      # glob + `head -1` would pick the stale checked-in file the moment its version sorts below the
      # one just built (e.g. tracked 1.4.0 vs built 1.4.1) and verify an artifact CI did not produce.
      - name: Resolve VSIX path
        id: vsix
        run: echo "path=xschem-viewer-configurable-$(node -p "require('./package.json').version").vsix" >> "$GITHUB_OUTPUT"
      - name: Verify VSIX is well-formed
        run: |
          VSIX="${{ steps.vsix.outputs.path }}"
          test -f "$VSIX"
          echo "Built: $VSIX"
          unzip -l "$VSIX" | grep -q 'extension/package.json'
          unzip -l "$VSIX" | grep -q 'extension.vsixmanifest'
          unzip -l "$VSIX" | grep -q 'extension/dist/assets/index.js'
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: ${{ steps.vsix.outputs.path }}
          if-no-files-found: error
