name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: ['18', '20', '22']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
      - name: Run test suite
        run: npm test

  build:
    name: Build VSIX
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip rsync
      - name: Build VSIX
        run: ./build-vsix.sh
      - name: Verify VSIX is well-formed
        run: |
          VSIX="$(ls xschem-viewer-configurable-*.vsix | head -1)"
          echo "Built: $VSIX"
          unzip -l "$VSIX" | grep -q 'extension/package.json'
          unzip -l "$VSIX" | grep -q 'extension.vsixmanifest'
          unzip -l "$VSIX" | grep -q 'extension/dist/assets/index.js'
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: xschem-viewer-configurable-*.vsix
          if-no-files-found: error
