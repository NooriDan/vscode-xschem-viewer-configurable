name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Optional: set this repo secret to also publish to the Open VSX registry.
      OVSX_TOKEN: ${{ secrets.OVSX_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test
        run: npm test

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y zip rsync

      - name: Build VSIX
        run: ./build-vsix.sh

      - name: Confirm VSIX built
        run: |
          VER="$(node -e "console.log(require('./package.json').version)")"
          test -f "xschem-viewer-configurable-${VER}.vsix" && echo "Built xschem-viewer-configurable-${VER}.vsix"

      - name: Verify tag matches package.json version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VER="$(node -e "console.log(require('./package.json').version)")"
          echo "package.json version: $VER ; tag: ${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_NAME}" != "v${VER}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} does not match package.json v${VER}"; exit 1
          fi

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VSIX="$(ls xschem-viewer-configurable-*.vsix | head -1)"
          gh release create "${GITHUB_REF_NAME}" "$VSIX" \
            --title "${GITHUB_REF_NAME}" \
            --notes "Install: \`code --install-extension ${VSIX} --force\` then **Developer: Reload Window**. See CHANGELOG.md for details."

      - name: Publish to Open VSX (optional)
        if: ${{ env.OVSX_TOKEN != '' }}
        run: npx --yes ovsx publish xschem-viewer-configurable-*.vsix -p "$OVSX_TOKEN"
